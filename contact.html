<head>

    <meta property="og:title" content="Contact — La Tisane de Jo">
    <meta property="og:description" content="Contactez-nous pour toute question sur nos tisanes bio artisanales de Grignan.">

    <link rel="canonical" href="https://www.latisanedejo.com/contact.html">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;0,9..144,900;1,9..144,400;1,9..144,900&display=swap" rel="stylesheet">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ContactPage",
      "name": "Contacter La Tisane de Jo",
      "url": "https://www.latisanedejo.com/contact.html",
      "mainEntity": {
        "@type": "LocalBusiness",
        "name": "La Tisane de Jo",
        "email": "latisanedejo@gmail.com",
        "address": { "@type": "PostalAddress", "addressLocality": "Grignan", "addressRegion": "Drôme", "addressCountry": "FR" }
      }
    }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --marron: #7D6B5C;
            --cream: #F5F0E3;
            --sage: #8B9F7A;
            --purple: #8B5CC6;
            --purple-dark: #7344B0;
            --warm-black: #2C2520;
            --dark-brown: #4A3F36;
        }
        body { font-family: 'Fraunces', serif; color: var(--warm-black); line-height: 1.6; background-color: var(--cream); }
        nav { background-color: #6B5B4E; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .nav-logo { font-weight: 900; font-size: 1.5rem; color: var(--cream); text-decoration: none; letter-spacing: 1px; }
        .nav-links { display: flex; gap: 2.5rem; list-style: none; }
        .nav-links a { color: var(--cream); text-decoration: none; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.85; }
        .nav-links a:hover { color: var(--purple); }

        .page-header { padding: 4rem 2rem 2rem; text-align: center; }
        .page-header h1 { font-weight: 900; font-size: 3rem; color: var(--marron); font-variation-settings: 'WONK' 1, 'SOFT' 100; }
        .page-header p { font-size: 1.1rem; color: #6B5B4E; margin-top: 1rem; }

        .contact-form { max-width: 600px; margin: 2rem auto 4rem; padding: 0 2rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.4rem; font-weight: 700; color: #6B5B4E; font-size: 0.95rem; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 0.8rem 1rem; border: 1px solid rgba(0,0,0,0.15); border-radius: 8px;
            font-family: 'Fraunces', serif; font-size: 1rem; background: #fff; color: #6B5B4E;
        }
        .form-group textarea { min-height: 150px; resize: vertical; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--purple); }
        .btn { display: inline-block; padding: 0.8rem 2.5rem; background: var(--purple); color: #fff; border: none; border-radius: 4px; font-family: 'Fraunces', serif; font-size: 1rem; font-weight: 700; cursor: pointer; }
        .btn:hover { background: var(--purple-dark); }

        footer { background-color: #6B5B4E; color: var(--cream); padding: 2rem; text-align: center; margin-top: 3rem; }
        footer a { color: var(--cream); text-decoration: none; margin: 0 1rem; opacity: 0.85; font-size: 0.95rem; }
        footer p { opacity: 0.6; font-size: 0.85rem; margin-top: 1rem; }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="nav-logo">La Tisane de Jo</a>
        <ul class="nav-links">
            <li><a href="/">Accueil</a></li>
            <li><a href="/#tisanes">Nos Tisanes</a></li>
            <li><a href="/notre-univers.html">Notre Univers</a></li>
        </ul>
    </nav>

    <main>
        <div class="page-header">
            <h1>Nous contacter</h1>
            <p>Une question, une suggestion ou simplement envie de dire bonjour ? Nous vous répondons avec plaisir.</p>
        </div>

        <form class="contact-form" action="https://formsubmit.co/latisanedejo@gmail.com" method="POST">
            <input type="hidden" name="_subject" value="Nouveau message via le site — La Tisane de Jo">
            <input type="hidden" name="_template" value="table">
            <input type="hidden" name="_captcha" value="true">
            <input type="hidden" name="_autoresponse" value="Bonjour, nous avons bien reçu votre message et nous vous répondrons dans les meilleurs délais. À très vite. — La Tisane de Jo">
            <input type="text" name="_honey" style="display:none" tabindex="-1" autocomplete="off">
            <div class="form-group">
                <label for="name">Nom</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="subject">Sujet</label>
                <input type="text" id="subject" name="subject" required>
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" required></textarea>
            </div>
            <button type="submit" class="btn">Envoyer</button>
        </form>
    </main>

    <footer>
        <div>
            <a href="/">Accueil</a>
            <a href="/#tisanes">Nos Tisanes</a>
            <a href="/notre-univers.html">Notre Univers</a>
            <a href="/faq.html">FAQ</a>
            <a href="/contact.html">Contact</a>
            <a href="https://www.instagram.com/latisanedejo/" target="_blank">Instagram</a>
        </div>
        <p>&copy; 2026 La Tisane de Jo. Tous droits réservés.</p>
    </footer>
</body>
</html>
