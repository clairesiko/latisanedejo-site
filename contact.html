<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="L5175DETMYp3d90KAxwCMftEfJO47Iv58lHJL7n-ivM" />
    <title>Contact — La Tisane de Jo | Tisanes bio de Grignan</title>
    <meta name="description" content="Contactez La Tisane de Jo pour toute question sur nos tisanes bio artisanales. Tisanes 100% bio cultivées en Drôme provençale, à Grignan.">
    <meta property="og:title" content="Contact — La Tisane de Jo">
    <meta property="og:description" content="Contactez-nous pour toute question sur nos tisanes bio artisanales de Grignan.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.latisanedejo.com/contact.html">
    <meta name="twitter:card" content="summary">
    <link rel="canonical" href="https://www.latisanedejo.com/contact.html">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;0,9..144,900;1,9..144,400;1,9..144,900&display=swap" rel="stylesheet">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ContactPage",
      "name": "Contacter La Tisane de Jo",
      "url": "https://www.latisanedejo.com/contact.html",
      "mainEntity": {
        "@type": "LocalBusiness",
        "name": "La Tisane de Jo",
        "email": "latisanedejo@gmail.com",
        "address": { "@type": "PostalAddress", "addressLocality": "Grignan", "addressRegion": "Drôme", "addressCountry": "FR" }
      }
    }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }        :root {
            --marron: #7D6B5C;
            --cream: #F7F3EB;
            --cream-paper: #F2EBD8;
            --sage: #8B9F7A;
            --sage-dark: #6B7F5A;
            --purple: #7B5C8E;
            --purple-dark: #5A4170;
            --purple-light: #9E7EB9;
            --brown: #6E2913;
            --warm-black: #2C2520;
            --body-text: #6B5B4E;
        }
        body {
            font-family: 'Fraunces', serif;
            color: var(--warm-black);
            line-height: 1.65;
            background-color: var(--cream);
            padding-top: 110px;
        }
        a { color: inherit; text-decoration: none; }

        /* === NAV (centered hand-drawn logo + diamond nav) === */
        nav {
            background: rgba(247, 243, 235, 0.94);
            backdrop-filter: blur(8px);
            padding: 22px 32px 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            justify-content: center;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
        }
        nav::after {
            content: "";
            position: absolute;
            left: 0; right: 0;
            bottom: -22px;
            height: 22px;
            background: linear-gradient(to bottom, rgba(247,243,235, 0.6), rgba(247,243,235, 0));
            pointer-events: none;
        }
        .nav-logo {
            font-family: 'Fraunces', serif;
            font-style: italic;
            font-weight: 800;
            font-variation-settings: "SOFT" 100, "WONK" 1;
            font-size: 38px;
            color: var(--purple);
            letter-spacing: -0.5px;
            line-height: 1;
            text-transform: none;
            transition: color 0.3s;
        }
        .nav-logo:hover { color: var(--purple-dark); }
        .nav-links {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 16px;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .nav-links li {
            display: flex;
            align-items: center;
            list-style: none;
        }
        .nav-links li:not(:first-child)::before {
            content: "\25C6";
            color: var(--brown);
            font-size: 8px;
            opacity: 0.6;
            margin-right: 16px;
            display: inline-block;
        }
        .nav-links a {
            color: var(--brown);
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 13px;
            transition: color 0.3s;
        }
        .nav-links a:hover { color: var(--purple); }

        /* === FOOTER === */
        footer {
            background: var(--brown);
            color: var(--cream);
            padding: 1.5rem 2rem;
            text-align: center;
            margin-top: 4rem;
        }
        footer > div {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 22px;
            font-size: 13px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 0.8rem;
        }
        footer a {
            color: var(--cream);
            opacity: 0.85;
            transition: color 0.3s, opacity 0.3s;
            margin: 0;
            font-size: 13px;
        }
        footer a:hover { color: var(--purple-light); opacity: 1; }
        footer p {
            font-size: 11px;
            opacity: 0.55;
            letter-spacing: 1px;
            margin-top: 0.5rem;
        }

        @media (max-width: 900px) {
            body { padding-top: 100px; }
            nav { padding: 14px 20px 12px; gap: 8px; }
            .nav-logo { font-size: 28px; }
            .nav-links { gap: 12px; flex-wrap: wrap; }
            .nav-links a { font-size: 11px; letter-spacing: 1.5px; }
            .nav-links li:not(:first-child)::before { margin-right: 12px; }
            footer { padding: 1.2rem 1rem; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="nav-logo">La Tisane de Jo</a>
        <ul class="nav-links">
            <li><a href="/">Accueil</a></li>
            <li><a href="/#tisanes">Nos Tisanes</a></li>
            <li><a href="/notre-univers.html">Notre Univers</a></li>
        </ul>
    </nav>

    <main>
        <div class="page-header">
            <h1>Nous contacter</h1>
            <p>Une question, une suggestion ou simplement envie de dire bonjour ? Nous vous répondons avec plaisir.</p>
        </div>

        <form class="contact-form" action="https://formsubmit.co/latisanedejo@gmail.com" method="POST">
            <input type="hidden" name="_subject" value="Nouveau message via le site — La Tisane de Jo">
            <input type="hidden" name="_template" value="table">
            <input type="hidden" name="_captcha" value="true">
            <input type="hidden" name="_autoresponse" value="Bonjour, nous avons bien reçu votre message et nous vous répondrons dans les meilleurs délais. À très vite. — La Tisane de Jo">
            <input type="text" name="_honey" style="display:none" tabindex="-1" autocomplete="off">
            <div class="form-group">
                <label for="name">Nom</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="subject">Sujet</label>
                <input type="text" id="subject" name="subject" required>
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" required></textarea>
            </div>
            <button type="submit" class="btn">Envoyer</button>
        </form>
    </main>

    <footer>
        <div>
            <a href="/">Accueil</a>
            <a href="/#tisanes">Nos Tisanes</a>
            <a href="/notre-univers.html">Notre Univers</a>
            <a href="/faq.html">FAQ</a>
            <a href="/contact.html">Contact</a>
            <a href="https://www.instagram.com/latisanedejo/" target="_blank">Instagram</a>
        </div>
        <p>&copy; 2026 La Tisane de Jo. Tous droits réservés.</p>
    </footer>
</body>
</html>
